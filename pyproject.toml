[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "objection"
version = "0.0.1"
description = "A Python query builder inspired by Objection.js"
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
